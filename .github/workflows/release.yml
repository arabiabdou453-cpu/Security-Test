name: Secure Release Pipeline

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:

    name: Build and Secure Release

    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install security tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget

          wget -O gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.28.0/gitleaks_8.28.0_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/gitleaks

          gitleaks version

          python3 -m pip install semgrep==1.131.0

          wget -O trivy.tar.gz https://github.com/aquasecurity/trivy/releases/download/v0.62.0/trivy_0.62.0_Linux-64bit.tar.gz
          tar -xzf trivy.tar.gz
          sudo mv trivy /usr/local/bin/trivy

          trivy --version

      - name: Run security validation
        run: npm run security:all

      - name: Build application
        run: |
          if npm run | grep -q "build"; then
            npm run build
          else
            echo "No build script found, skipping."
          fi

      - name: Generate artifact
        run: |
          mkdir release
          cp -r . release/

      - name: Upload release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: application-release
          path: release/

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45
        with:
          subject-path: release/**
name: CI Build Verification

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:

    name: Application Quality Check

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0


      - name: Setup Node.js
        uses: actions/setup-node@1e60f620b9541dcae5b3c6f9d3c5d8d5e2a4f6b7
        with:
          node-version: 22
          cache: npm


      - name: Install dependencies
        run: npm ci


      - name: TypeScript check
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit
          else
            echo "No TypeScript configuration found, skipping."
          fi


      - name: Run tests
        run: npm test


      - name: Production build check
        run: |
          if npm run | grep -q "build"; then
            npm run build
          else
            echo "No build script found, skipping."
          fi
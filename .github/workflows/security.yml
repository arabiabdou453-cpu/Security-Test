name: Security Scan

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master


jobs:
  security:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2


      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: auto


      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
name: Generate SBOM

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  release:
    types:
      - created

permissions:
  contents: write
  actions: read

jobs:
  sbom:
    name: Generate Software Bill of Materials
    runs-on: ubuntu-latest

    steps:
      # Checkout repository pinned to SHA
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      # Generate SBOM pinned to commit SHA
      - name: Generate SBOM
        uses: anchore/sbom-action@df80a981bc6edbc4e220a492d3cbe9f5547a6e75
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true

      # Upload SBOM as workflow artifact
      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom
          path: sbom.spdx.json

      # Attach SBOM to release using fixed SHA for softprops/action-gh-release
      - name: Upload SBOM to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: sbom.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}